# HTTP ingress - just redirects to HTTPS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: waf-ingress-http
  namespace: hirefy
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: hirefy-redirect-https@kubernetescrd
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: waf
                port:
                  number: 8080
---
# HTTPS ingress - actual traffic
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: waf-ingress-https
  namespace: hirefy
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: hirefy-rate-limit@kubernetescrd
spec:
  tls:
    - secretName: hirefy-tls
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: waf
                port:
                  number: 8080
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: hirefy
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: hirefy
spec:
  rateLimit:
    average: 10    
    burst: 5