apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-service-db
  namespace: hirefy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quiz-service-db
  template:
    metadata:
      labels:
        app: quiz-service-db
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "quiz-service-db"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/quiz-service-db/config"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/quiz-service-db/config" -}}
          export MARIADB_ROOT_PASSWORD="{{ .Data.data.MARIADB_ROOT_PASSWORD }}"
          export MARIADB_DATABASE="{{ .Data.data.MARIADB_DATABASE }}"
          export MARIADB_USER="{{ .Data.data.MARIADB_USER }}"
          export MARIADB_PASSWORD="{{ .Data.data.MARIADB_PASSWORD }}"
          {{- end }}
    spec:
      serviceAccountName: app-service-account
      containers:
        - name: quiz-service-db
          image: mariadb:11
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          command:
          - /bin/sh
          - -c
          - |
            # Wait for Vault to inject the file
            for i in $(seq 1 60); do
              [ -f /vault/secrets/config ] && break
              echo "Waiting for Vault secret file /vault/secrets/config..."
              sleep 1
            done

            if [ ! -f /vault/secrets/config ]; then
              echo "ERROR: Vault secret file /vault/secrets/config not found"
              exit 1
            fi

            . /vault/secrets/config
            env | grep -E '^MARIADB_' || true

            exec docker-entrypoint.sh mariadbd
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: quiz-service-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: quiz-service-db
  namespace: hirefy
spec:
  selector:
    app: quiz-service-db
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
  type: ClusterIP