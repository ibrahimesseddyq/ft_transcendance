apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-service-db
  namespace: hirefy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quiz-service-db
  template:
    metadata:
      labels:
        app: quiz-service-db
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "quiz-service-db"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/quiz-service-db/config"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/quiz-service-db/config" -}}
          export MARIADB_ROOT_PASSWORD="{{ .Data.data.MARIADB_ROOT_PASSWORD }}"
          export MARIADB_DATABASE="{{ .Data.data.MARIADB_DATABASE }}"
          export MARIADB_USER="{{ .Data.data.MARIADB_USER }}"
          export MARIADB_PASSWORD="{{ .Data.data.MARIADB_PASSWORD }}"
          {{- end }}
    spec:
      serviceAccountName: app-service-account
      containers:
        - name: quiz-service-db
          image: mariadb:11
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          command:
            - /bin/sh
            - -c
            - |
              # Source Vault secrets
              . /vault/secrets/config
              # Start MariaDB
              docker-entrypoint.sh mariadbd
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: quiz-service-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: quiz-service-db
  namespace: hirefy
spec:
  selector:
    app: quiz-service-db
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
  type: ClusterIP