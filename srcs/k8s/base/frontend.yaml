apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend:dev
  namespace: hirefy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: frontend:dev
          image:PullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: VITE_API_URL # to check
              value: "http://gateway:8081"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: hirefy
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP