apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: hirefy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "mariadb"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/mariadb/config"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/mariadb/config" -}}
          export MYSQL_ROOT_PASSWORD="{{ .Data.data.MYSQL_ROOT_PASSWORD }}"
          export MYSQL_DATABASE="{{ .Data.data.MYSQL_DATABASE }}"
          export MYSQL_USER="{{ .Data.data.MYSQL_USER }}"
          export MYSQL_PASSWORD="{{ .Data.data.MYSQL_PASSWORD }}"
          {{- end }}
    spec:
      serviceAccountName: app-service-account
      containers:
        - name: mariadb
          image: mariadb:11
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          command:
            - /bin/sh
            - -c
            - |
              # Source Vault secrets
              source /vault/secrets/config
              # Start MariaDB
              docker-entrypoint.sh mariadbd
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mariadb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: hirefy
spec:
  selector:
    app: mariadb
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
  type: ClusterIP