apiVersion: v1
kind: Secret
metadata:
  name: ai-service-secret
  namespace: hirefy
type: Opaque
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: hirefy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ai-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            - name: PORT
              value: "5000"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: hirefy
spec:
  selector:
    app: ai-service
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
  type: ClusterIP