apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-service
  namespace: hirefy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quiz-service
  template:
    metadata:
      labels:
        app: quiz-service
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "quiz-service"
        vault.hashicorp.com/agent-inject-secret-database: "secret/data/quiz-service/database"
        vault.hashicorp.com/agent-inject-template-database: |
          {{- with secret "secret/data/quiz-service/database" -}}
          export DATABASE_URL="{{ .Data.data.DATABASE_URL }}"
          {{- end }}
      spec:
        serviceAccountName: app-service-account
        containers:
          - name: quiz-service
            image: quiz-service:dev
            imagePullPolicy: IfNotPresent
            ports:
              - name: http
                containerPort: 3001
                protocol: TCP
            command:
              - /bin/sh
              - -c
              - |
                # Source Vault secrets
                source /vault/secrets/database
                source /vault/secrets/config
                # Start the application
                npm run dev
---
apiVersion: v1
kind: Service
metadata:
  name: quiz-service
  namespace: hirefy
spec:
  selector:
    app: quiz-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: quiz-service-config
  namespace: hirefy
data:
  PORT: "3001"
  NODE_ENV: "production"
