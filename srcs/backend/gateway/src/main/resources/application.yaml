
server:
  port: 8081
  http2:
    enabled: true
spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
  
  sql:
    init: always
  
eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka
    register-with-eureka: true
    fetch-registry: true
    healthcheck-enabled: true
    registry-fetch-interval-seconds: 5
    initial-instance-info-replication-interval-seconds: 5
