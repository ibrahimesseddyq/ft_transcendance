<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Service</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen (hidden when embedded) -->
        <div id="login-screen" class="screen" style="display: none;">
            <div class="login-container">
                <h1>💬 Chat Service</h1>
                <p class="subtitle">Please login to the main application to access chat</p>
                <form id="login-form">
                    <p style="text-align:center; padding:20px;">
                        <a href="/" style="color: #3b82f6; text-decoration: underline;">Go to Login Page</a>
                    </p>
                </form>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="screen">
            <div class="chat-layout">
                <!-- Sidebar -->
                <aside class="sidebar" id="main-sidebar">
                    <!-- RH Profile Sidebar (Candidate View) -->
                    <div class="rh-profile-sidebar-content" id="rh-profile-sidebar" style="display: none;">
                        <div class="rh-profile-container">
                            <div class="rh-profile-avatar-wrapper">
                                <div class="rh-profile-avatar" id="rh-profile-avatar">
                                    <img id="rh-profile-image" src="" alt="RH" style="display: none;">
                                    <span id="rh-profile-initials">RH</span>
                                </div>
                                <div class="online-indicator offline" id="rh-online-indicator"></div>
                            </div>
                            <div class="rh-profile-status-label" id="rh-profile-status">Offline</div>
                            <div class="rh-profile-name" id="rh-profile-name">Loading...</div>
                            <div class="rh-profile-email" id="rh-profile-email" style="font-size: 12px; color: #666; margin-top: 4px;"></div>
                        </div>
                        <div class="rh-profile-bottom">
                            <div class="rh-profile-company" id="rh-profile-company">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                                </svg>
                                Company's HR
                            </div>
                        </div>
                    </div>

                    <!-- Normal Sidebar (RH/Admin View) -->
                    <div class="normal-sidebar-content" id="normal-sidebar">
                        <div class="sidebar-header">
                            <h2 class="sidebar-title">Messages</h2>
                        </div>
                        <div class="sidebar-search">
                            <div class="search-input-wrapper">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.35-4.35"></path>
                                </svg>
                                <input type="text" id="conversation-search" class="search-input" placeholder="Search conversations...">
                            </div>
                        </div>

                        <div class="conversations-list" id="conversations-list">
                            <div class="empty-state">
                                <p>No conversations yet</p>
                            </div>
                        </div>
                    </div>
                </aside>

                <!-- Main Chat Area -->
                <main class="chat-main">
                    <!-- Mobile Menu Toggle -->
                    <button class="mobile-menu-toggle" id="mobile-menu-toggle" style="display: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>

                    <!-- Empty State -->
                    <div id="chat-empty-state" class="chat-empty-state active">
                        <div class="empty-illustration">
                            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                        </div>
                        <h2>Select a conversation</h2>
                        <p>Choose a conversation from the sidebar or start a new one</p>
                    </div>

                    <!-- Active Chat -->
                    <div id="chat-active" class="chat-active">
                        <!-- Mobile RH Header for Candidates -->
                        <div class="mobile-rh-header" id="mobile-rh-header" style="display: none;">
                            <div class="mobile-rh-avatar" id="mobile-rh-avatar">
                                <img id="mobile-rh-image" src="" alt="RH" style="display: none;">
                                <span id="mobile-rh-initials">RH</span>
                            </div>
                            <div class="mobile-rh-info">
                                <div class="mobile-rh-name" id="mobile-rh-name">Loading...</div>
                                <div class="mobile-rh-status" id="mobile-rh-status">Online</div>
                            </div>
                        </div>

                        <div class="chat-header" id="chat-header">
                            <button class="btn btn-icon mobile-back-btn" id="mobile-back-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg>
                            </button>
                            <div class="chat-header-info">
                                <div class="avatar" id="chat-avatar"></div>
                                <div class="chat-header-details">
                                    <span class="chat-name" id="chat-name"></span>
                                    <span class="chat-status" id="chat-status"></span>
                                </div>
                            </div>
                        </div>

                        <div class="messages-container" id="messages-container">
                            <div class="messages-list" id="messages-list"></div>
                            <div class="typing-indicator" id="typing-indicator">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                        </div>

                        <div class="chat-input-area">
                            <form id="message-form">
                                <div class="input-wrapper">
                                    <input type="file" id="file-input" class="hidden-file-input"
                                        accept="image/jpeg,image/png,image/gif,image/webp,video/mp4,video/webm,application/pdf">
                                    <button type="button" class="btn btn-icon btn-attach" id="attach-btn" title="Attach file">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"></path>
                                        </svg>
                                    </button>
                                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                                    <button type="submit" class="btn btn-primary btn-send">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <line x1="22" y1="2" x2="11" y2="13"></line>
                                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                        </svg>
                                    </button>
                                </div>
                                <div class="file-preview" id="file-preview" style="display:none;">
                                    <span class="file-preview-name" id="file-preview-name"></span>
                                    <button type="button" class="btn btn-icon btn-remove-file" id="remove-file-btn" title="Remove file">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <line x1="18" y1="6" x2="6" y2="18"></line>
                                            <line x1="6" y1="6" x2="18" y2="18"></line>
                                        </svg>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- New Conversation Modal -->
    <div id="new-conversation-modal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>New Conversation</h2>
                <button class="btn btn-icon modal-close" id="modal-close">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="new-conversation-form">
                    <div class="form-group">
                        <label for="participant-id">Participant ID</label>
                        <input type="text" id="participant-id" placeholder="Enter user ID to chat with" required>
                    </div>
                    <div class="form-group">
                        <label for="participant-role">Participant Role</label>
                        <select id="participant-role" required>
                            <option value="">Select role</option>
                            <option value="recruiter">Recruiter (RH)</option>
                            <option value="candidate">Candidate</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Start Conversation</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Image Lightbox Overlay -->
    <div id="image-overlay" class="image-overlay">
        <button class="overlay-close" title="Close">&times;</button>
        <img id="overlay-image" src="" alt="Preview">
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/api.js"></script>
    <script src="js/socket.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
