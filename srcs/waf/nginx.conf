server_tokens off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server 
{
    listen 8080 default_server;
    server_name localhost;
    
    modsecurity on;

    # modsecurity_rules_file /etc/nginx/modsecurity.d/modsecurity.conf;

    # Dynamic DNS resolution for Kubernetes services
    resolver kube-dns.kube-system.svc.cluster.local valid=10s;
    set $upstream_frontend "http://frontend:80";
    set $upstream_backend "http://gateway:8081";
    
    location / {
        proxy_pass $upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass $upstream_backend;
        include includes/cors.conf;
        include includes/proxy_backend.conf;
    }

    include includes/location_common.conf;
}